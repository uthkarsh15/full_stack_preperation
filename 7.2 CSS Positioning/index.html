<!DOCTYPE html>
<html lang="en">
  <head>
    <title>CSS Positioning Exercise</title>
    <meta charset="UTF-08">
    <style>
      
      .blue-rectangle{
        background-color: blue;
        height: 300px;
        width: 500px;
        position: relative;
        top: 200px;
        left: 200px;
      }
      .red-circle{
        background-color: red;
        height: 200px;
        width: 200px;
        border-radius: 50%;
        position: absolute;
        top: 150px;
        left: 250px;
      }
    </style>
  </head>
  <body>
    <div class="blue-rectangle">
      <div class="red-circle">

      </div>
    </div>
    
  </body>
</html>
